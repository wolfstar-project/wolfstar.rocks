packages: []

allowedDeprecatedVersions:
    glob: 7.2.3
    inflight: 1.0.6
    sourcemap-codec: 1.4.8

shamefullyHoist: true
hoistPattern:
    - "*prisma*"
publicHoistPattern:
    - "*import-in-the-middle*"
    - "*require-in-the-middle*"

confirmModulesPurge: false

dedupePeers: true
strictDepBuilds: false

overrides:
    "@netlify/api": ^14.0.18
    # Keep a single discord-api-types instance; two copies make structurally
    # identical Discord payload types nominally incompatible during typecheck
    discord-api-types: 0.38.48
    # Same reason as above: `Ref` and friends are nominal (symbol-branded), so two
    # vue copies make VueUse and app refs incompatible during typecheck
    vue: 3.5.38
    sharp: 0.34.5
    vite: npm:@voidzero-dev/vite-plus-core@0.1.24
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.24

patchedDependencies:
    "@nuxt/test-utils": patches/@nuxt__test-utils.patch

catalogs:
    msw:
        "msw": "^2.13.2"

    storybook:
        "@storybook-vue/nuxt": "9.1.0-29411911.f34c865"
        "@storybook/addon-a11y": "^10.3.5"
        "@storybook/addon-docs": "^10.3.5"
        "@storybook/addon-themes": "^10.3.5"
        "msw-storybook-addon": "^2.0.7"
        "storybook": "^10.3.1"

peerDependencyRules:
    allowAny:
        - "vite"
        - "vitest"

shellEmulator: true

allowBuilds:
    "@google/genai": false
    "@parcel/watcher": false
    "@prisma/client": true
    "@prisma/engines": true
    "@sentry/cli": false
    "@tailwindcss/oxide": true
    better-sqlite3: true
    core-js: false
    esbuild: false
    msw: true
    onnxruntime-node: false
    prisma: true
    protobufjs: false
    sharp: true
    unrs-resolver: false
    vue-demi: false

minimumReleaseAge: 2880

minimumReleaseAgeExclude:
    # Nuxt
    - "@nuxt/*"
    - "@nuxtjs/*"
    - "nuxt"
    - "nuxt-*"
