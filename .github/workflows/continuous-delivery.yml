name: Continuous Delivery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
    paths:
      - "app/**/*"
      - "server/**/*"
      - "config/*"
      - "modules/*"
      - nuxt.config.ts # File config Nuxt
      - Dockerfile
      - .github/workflows/continuous-delivery.yml
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

env:
  HUSKY: 0

jobs:
  publish:
    name: Publish WolfStar Latest image to GHCR
    uses: wolfstar-project/.github/.github/workflows/reusable-publish-image.yml@main
    secrets: inherit
    with:
      enablePlatforms: true
      platforms: >-
        [{"platform": "linux/amd64", "runner": "ubuntu-latest"}, {"platform": "linux/arm64", "runner": "ubuntu-latest"}]
