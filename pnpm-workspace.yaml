packages: []

allowedDeprecatedVersions:
    glob: 7.2.3
    inflight: 1.0.6
    sourcemap-codec: 1.4.8

# pnpm v11: hoisting config must live here (no longer read from .npmrc)
shamefullyHoist: true
hoistPattern:
    - "*prisma*"
publicHoistPattern:
    - "*import-in-the-middle*"
    - "*require-in-the-middle*"

confirmModulesPurge: false

dedupePeers: true
strictDepBuilds: false

overrides:
    "@netlify/api": ^14.0.18
    sharp: 0.34.5
    vite: npm:@voidzero-dev/vite-plus-core@0.1.19
    vitest: npm:@voidzero-dev/vite-plus-test@0.1.19

patchedDependencies:
    "@nuxt/test-utils": patches/@nuxt__test-utils.patch

peerDependencyRules:
    allowAny:
        - "vite"
        - "vitest"

shellEmulator: true

# pnpm v11: allowBuilds replaces onlyBuiltDependencies + ignoredBuiltDependencies
allowBuilds:
    "@parcel/watcher": false
    "@prisma/client": true
    "@prisma/engines": true
    "@sentry/cli": false
    "@tailwindcss/oxide": true
    better-sqlite3: true
    core-js: false
    esbuild: false
    onnxruntime-node: false
    prisma: true
    protobufjs: false
    sharp: true
    unrs-resolver: false
    vue-demi: false
    workerd: true
