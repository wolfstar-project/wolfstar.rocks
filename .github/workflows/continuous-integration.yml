name: ci
on:
  pull_request:
    branches:
      - main
      - release
  push:
    branches:
      - main
  merge_group:
    branches:
      - main

# cancel in-progress runs on new commits to same PR (gitub.event.number)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: 🔠 Lint project
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies (root only, no scripts)
        run: pnpm install --filter . --ignore-scripts

      - name: 🔠 Lint project
        run: pnpm vp run lint

  unit:
    name: 🧪 Unit tests
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Unit tests
        run: pnpm vp test --project unit --coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: ⬆︎ Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test:
    name: 🧪 Component tests
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🌐 Install browser
        run: pnpm vp exec playwright install chromium-headless-shell

      - name: 🧪 Component tests
        run: pnpm vp test --project nuxt --coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: ⬆︎ Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          report_type: test_results
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: ⬆︎ Upload coverage reports to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  browser:
    name: 🖥️ Browser tests
    runs-on: ubuntu-24.04-arm
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔼 Generate Prisma Client
        run: pnpm prisma:generate

      - name: 🏗️ Build project
        run: pnpm vp run build:test
        env:
          VALIDATE_HTML: true
          NODE_OPTIONS: --max-old-space-size=4096
          NUXT_SESSION_PASSWORD: ci-test-session-password-at-least-32-characters-long

      - name: 🖥️ Test project (browser)
        run: pnpm vp run test:browser:prebuilt
        env:
          NUXT_SESSION_PASSWORD: ci-test-session-password-at-least-32-characters-long

  benchmark:
    name: ⚡ Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: ⚡ Run benchmarks
        uses: CodSpeedHQ/action@4deb3275dd364fb96fb074c953133d29ec96f80f
        with:
          mode: simulation
          run: pnpm vp run test:bench

  a11y:
    name: ♿ Accessibility audit
    runs-on: ubuntu-latest # See https://github.com/GoogleChrome/lighthouse/discussions/16834
    strategy:
      matrix:
        mode: [dark, light]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🔼 Generate Prisma Client
        run: pnpm prisma:generate

      - name: 🏗️ Build project
        run: pnpm vp run build:test
        env:
          NUXT_SESSION_PASSWORD: ci-test-session-password-at-least-32-characters-long

      - name: ♿ Accessibility audit (Lighthouse - ${{ matrix.mode }} mode)
        run: pnpm vp run test:a11y:prebuilt
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LIGHTHOUSE_COLOR_MODE: ${{ matrix.mode }}
          NUXT_SESSION_PASSWORD: ci-test-session-password-at-least-32-characters-long

  knip:
    name: 🧹 Unused code check
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # 5e1c8eafbd745f64b1ef30a7d7ed7965034c486c
        name: 🟧 Install pnpm

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧹 Check for unused code
        run: pnpm vp run knip

      - name: 🧹 Check for unused production code
        run: pnpm vp run knip --production
