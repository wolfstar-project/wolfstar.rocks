packages: []

allowedDeprecatedVersions:
  glob: 7.2.3
  inflight: 1.0.6
  sourcemap-codec: 1.4.8

ignoredBuiltDependencies:
  - "@parcel/watcher"
  - core-js
  - esbuild
  - unrs-resolver
  - vue-demi

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "@tailwindcss/oxide"
  - prisma
  - sharp@0.34.5
  - workerd
  - better-sqlite3

dedupePeers: true
strictDepBuilds: false

overrides:
  "@netlify/api": ^14.0.18
  sharp: 0.34.5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.19
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.19

patchedDependencies:
  "@nuxt/test-utils": patches/@nuxt__test-utils.patch

peerDependencyRules:
  allowAny:
    - "vite"
    - "vitest"

shellEmulator: true

allowBuilds:
  '@parcel/watcher': set this to true or false
  '@prisma/engines': set this to true or false
  '@sentry/cli': set this to true or false
  esbuild: set this to true or false
  onnxruntime-node: set this to true or false
  prisma: set this to true or false
  protobufjs: set this to true or false
  sharp: set this to true or false
  vue-demi: set this to true or false
