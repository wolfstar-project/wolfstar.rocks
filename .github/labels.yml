# Labels used across this repository
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "need repro"
  color: "e4e669"
  description: "Needs a reproduction to be investigated"

- name: "Meta: Feature"
  color: "0075ca"
  description: "New feature or request"

- name: "blocked"
  color: "b60205"
  description: "Blocked by another issue or PR"

- name: "in review"
  color: "8250df"
  description: "Currently under review"

- name: "semver:major"
  color: "f9d0c4"
  description: "Breaking change — major version bump required"

- name: "release"
  color: "0e8a16"
  description: "Release pull request"

- name: "enhancement"
  color: "a2eeef"
  description: "New feature or improvement"

- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"

- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"

- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"

- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

- name: "invalid"
  color: "e4e4e4"
  description: "This doesn't seem right"

- name: "question"
  color: "d876e3"
  description: "Further information is requested"

- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

- name: "dependencies"
  color: "0075ca"
  description: "Pull requests that update a dependency file"
