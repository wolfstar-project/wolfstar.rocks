<!-- Inject global CSS variables and stubs needed before Storybook renders -->
<style>
	/* Load Geist fonts to match the production app (normally handled by @nuxt/fonts,
     which is disabled in Storybook at this time) */
	@font-face {
		font-family: "Geist";
		font-weight: 400;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/Geist-Regular.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist";
		font-weight: 500;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/Geist-Medium.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist";
		font-weight: 600;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/Geist-SemiBold.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist";
		font-weight: 700;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/Geist-Bold.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist Mono";
		font-weight: 400;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/GeistMono-Regular.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist Mono";
		font-weight: 500;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/GeistMono-Medium.ttf") format("truetype");
	}
	@font-face {
		font-family: "Geist Mono";
		font-weight: 700;
		font-style: normal;
		font-display: swap;
		src: url("/fonts/GeistMono-Bold.ttf") format("truetype");
	}
	html {
		-webkit-font-smoothing: antialiased;
		-moz-osx-font-smoothing: grayscale;
		text-rendering: optimizeLegibility;
	}

	/* Override docs story canvas background to match wolfstar theme */
	.docs-story {
		background-color: var(--bg, oklch(0.1149 0 0)) !important;
	}
</style>
<script>
	// Stub Nuxt specific globals
	// @nuxtjs/color-mode's plugin.client.js reads window[globalName] at module
	// evaluation time — before any Storybook setup() callback runs — so the
	// global must exist in the HTML head, not in preview.ts.
	window.__NUXT_COLOR_MODE__ ??= {
		preference: "system",
		value: "dark",
		getColorScheme: function () {
			return "dark";
		},
		addColorScheme: function () {},
		removeColorScheme: function () {},
	};
</script>

<!-- Ensure the root element carries data-theme so withThemeByDataAttribute works from mount -->
<script>
	document.documentElement.setAttribute("data-theme", "dark");
</script>
